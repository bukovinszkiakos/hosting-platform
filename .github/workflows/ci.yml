name: CI

# Continuous Integration only — build/lint/validate the whole monorepo on every
# push and pull request. Deployment to AWS is intentionally NOT part of this
# workflow; it will be a separate, manually triggered workflow.
on:
  push:
  pull_request:

# Cancel superseded runs for the same ref so only the latest commit is checked.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

jobs:
  backend:
    name: Backend (restore + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # No packages.lock.json in the repo, so key the NuGet cache on the project
      # files (they change rarely).
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore HostingPlatform.sln

      - name: Build
        run: dotnet build HostingPlatform.sln --no-restore -c Release -warnaserror

      # Runs the xUnit test project (HostingPlatform.Api.Tests) built above. A
      # failing test fails the job, so tests gate merges. Tests use SQLite
      # in-memory, so no database/service is required.
      - name: Test
        run: dotnet test HostingPlatform.sln --no-build -c Release

  frontend:
    name: Frontend (lint + types + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      # Runs the Vitest suite (jsdom). A failing test fails the job, so frontend
      # tests gate merges just like the backend xUnit tests. `test` maps to
      # `vitest run` (non-watch).
      - name: Test (Vitest)
        run: npm test

      - name: Build
        run: npm run build

  terraform:
    name: Terraform (fmt + validate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - name: Format check
        run: terraform fmt -check -recursive

      # Validate each root configuration (backend state bootstrap + both
      # environments). Modules are validated transitively through the environments.
      # -backend=false so no S3 backend / AWS credentials are needed.
      - name: Validate
        run: |
          for dir in backend environments/dev environments/prod; do
            echo "== $dir =="
            terraform -chdir="$dir" init -backend=false -input=false
            terraform -chdir="$dir" validate
          done

  kubernetes:
    name: Kubernetes (kubeconform)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # Schema-validate the manifests without a cluster. -ignore-missing-schemas
      # tolerates CRDs; -strict rejects unknown/duplicate fields.
      - name: Validate manifests (kubeconform)
        run: |
          VERSION="v0.6.7"
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${VERSION}/kubeconform-linux-amd64.tar.gz" | tar -xz
          ./kubeconform -strict -summary -ignore-missing-schemas k8s/

  # Build and push the application images to the DEV ECR repositories, tagged by
  # commit SHA. Runs only on a push to main and only after every validation job
  # passes, so nothing is published from a PR or a red build. Deployment remains a
  # separate, manual step (deploy.yml) that consumes these image URIs.
  images:
    name: Build & push images (dev ECR)
    needs: [backend, frontend, terraform, kubernetes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # The dev GitHub Environment: makes the OIDC token subject
    # (repo:<repo>:environment:dev) match the dev role's trust policy and exposes
    # the env-scoped AWS_ROLE_ARN / AWS_REGION secrets — same pattern as deploy.yml.
    environment: dev
    permissions:
      contents: read
      id-token: write # request the OIDC token used to assume the AWS role
    steps:
      - uses: actions/checkout@v4

      - name: Short commit SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      # linux/amd64 matches the t3 (x86_64) worker nodes. The build contexts are the
      # backend/ and frontend/ directories, as documented in each Dockerfile.
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/amd64
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/hosting-platform-dev-backend:${{ steps.sha.outputs.short }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          platforms: linux/amd64
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/hosting-platform-dev-frontend:${{ steps.sha.outputs.short }}

      - name: Summary
        run: |
          {
            echo "## Images pushed to dev ECR"
            echo "- Backend:  \`${{ steps.ecr.outputs.registry }}/hosting-platform-dev-backend:${{ steps.sha.outputs.short }}\`"
            echo "- Frontend: \`${{ steps.ecr.outputs.registry }}/hosting-platform-dev-frontend:${{ steps.sha.outputs.short }}\`"
            echo ""
            echo "Deploy: Actions → Deploy (manual) → environment=dev, using the URIs above."
          } >> "$GITHUB_STEP_SUMMARY"
