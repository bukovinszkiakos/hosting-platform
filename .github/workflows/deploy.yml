name: Deploy (manual)

# Manual-only Continuous Deployment — NEVER triggered automatically.
#
# Scope: deploy the application to an ALREADY-PROVISIONED EKS cluster (apply the
# Kubernetes manifests and wait for the rollout). Infrastructure provisioning
# (`terraform apply`), container image build/push, the AWS Load Balancer Controller
# install, and the ConfigMap/Secret are one-time bootstrap steps performed
# manually — see docs/16-deployment.md. This keeps the automated path safe
# and idempotent and avoids running state-sensitive `terraform apply` from an
# ephemeral runner. Database migrations ARE applied here, as an idempotent one-off Job
# run before the rollout (see the "Run database migrations" step).
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [dev, prod]
        default: dev
      backend_image:
        description: "Backend image URI (e.g. <acct>.dkr.ecr.<region>.amazonaws.com/hosting-platform-<env>-backend:<tag>)"
        type: string
        required: true
      frontend_image:
        description: "Frontend image URI (e.g. <acct>.dkr.ecr.<region>.amazonaws.com/hosting-platform-<env>-frontend:<tag>)"
        type: string
        required: true

# Never run two deployments to the same environment at once, and never cancel a
# deployment that is already in flight.
concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  # Required for GitHub OIDC: lets the job request a signed OIDC token that AWS STS
  # exchanges for short-lived credentials by assuming the deploy role. No long-lived
  # AWS access keys are stored anywhere (see docs/16-deployment.md "GitHub Secrets").
  id-token: write

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Uses a GitHub Environment so secrets can be scoped and protection rules
    # (e.g. required reviewers) can gate production. Created on first use if absent.
    environment: ${{ inputs.environment }}
    env:
      NAMESPACE: hosting-platform
      CLUSTER_NAME: hosting-platform-${{ inputs.environment }}-eks
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "$AWS_ROLE_ARN" ] || missing+=("AWS_ROLE_ARN")
          [ -n "$AWS_REGION" ]   || missing+=("AWS_REGION")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]} (see docs/16-deployment.md)"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Configure AWS credentials
        # OIDC federation: no stored access keys. The action requests a signed OIDC
        # token (enabled by `id-token: write` above) and assumes the deploy role,
        # receiving short-lived credentials scoped to this run.
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure kubectl
        run: |
          set -euo pipefail
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"
          kubectl config current-context

      - name: Apply base resources (namespace, service account, RBAC)
        run: |
          set -euo pipefail
          kubectl apply -f k8s/base/namespace.yaml
          kubectl apply -f k8s/base/serviceaccount.yaml
          kubectl apply -f k8s/base/rbac.yaml

      - name: Verify bootstrap ConfigMap and Secret exist
        run: |
          set -euo pipefail
          # These carry environment-specific (Terraform outputs) and sensitive
          # (DB connection string) values and are created once during bootstrap
          # (see docs/16-deployment.md). Fail early rather than roll out pods that
          # would crash-loop on missing configuration.
          for res in configmap/backend-config configmap/frontend-config secret/backend-secrets; do
            if ! kubectl -n "$NAMESPACE" get "$res" >/dev/null 2>&1; then
              echo "::error::Missing $res in $NAMESPACE. Create it during bootstrap (see docs/16-deployment.md, k8s/base/configmap.example.yaml, k8s/secrets/secret.example.yaml)."
              exit 1
            fi
          done
          echo "ConfigMap and Secret are present."

      - name: Verify AWS Load Balancer Controller is installed
        run: |
          set -euo pipefail
          # The Ingress applied at the end of this workflow only provisions an ALB
          # if the AWS Load Balancer Controller is running in the cluster (one-time
          # bootstrap step 3, see docs/16-deployment.md "AWS Load Balancer
          # Controller"). Without it, applying the Ingress SUCCEEDS silently and no
          # ALB is ever created — the deploy would go green with an unreachable
          # platform. Fail fast instead, like the ConfigMap/Secret check above.
          if ! kubectl -n kube-system get deployment aws-load-balancer-controller >/dev/null 2>&1; then
            echo "::error::AWS Load Balancer Controller is not installed (no deployment/aws-load-balancer-controller in kube-system). The Ingress cannot provision an ALB without it. Run scripts/deployment/install-alb-controller.sh ${{ inputs.environment }} (bootstrap step 3, docs/16-deployment.md)."
            exit 1
          fi
          echo "AWS Load Balancer Controller is installed."

      - name: Run database migrations
        env:
          BACKEND_IMAGE: ${{ inputs.backend_image }}
        run: |
          set -euo pipefail
          # Apply pending EF Core migrations with a one-off Job that runs the SAME
          # backend image being deployed (`dotnet HostingPlatform.Api.dll migrate`),
          # BEFORE rolling out the app, so the schema always matches the new code and
          # the backend (which seeds Identity roles on startup) never starts against a
          # missing/stale schema. Migrations are idempotent, so this is safe on every
          # deploy. Jobs are immutable, so any previous run is deleted before re-applying.
          kubectl -n "$NAMESPACE" delete job db-migrate --ignore-not-found
          # Fail fast if the placeholder line drifted — otherwise sed exits 0 without
          # substituting and the Job ships image: "PLACEHOLDER" (opaque pull failure).
          grep -q 'image: "PLACEHOLDER"' k8s/jobs/migrate-job.yaml || {
            echo '::error::image placeholder not found in k8s/jobs/migrate-job.yaml — cannot inject the backend image.'; exit 1; }
          sed "s#image: \"PLACEHOLDER\".*#image: \"${BACKEND_IMAGE}\"#" k8s/jobs/migrate-job.yaml | kubectl apply -f -
          # Poll the Job's conditions so a failure ends the deploy promptly (respecting
          # backoffLimit) instead of waiting out the whole timeout.
          for _ in $(seq 1 66); do  # ~330s at 5s intervals (> the Job activeDeadlineSeconds)
            complete=$(kubectl -n "$NAMESPACE" get job/db-migrate -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || true)
            failed=$(kubectl -n "$NAMESPACE" get job/db-migrate -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || true)
            if [ "$complete" = "True" ]; then
              echo "Database migrations applied."
              exit 0
            fi
            if [ "$failed" = "True" ]; then
              echo "::error::Database migration failed. Recent logs:"
              kubectl -n "$NAMESPACE" logs job/db-migrate --tail=200 || true
              exit 1
            fi
            sleep 5
          done
          echo "::error::Timed out waiting for the database migration. Recent logs:"
          kubectl -n "$NAMESPACE" logs job/db-migrate --tail=200 || true
          exit 1

      - name: Deploy services and workloads
        env:
          BACKEND_IMAGE: ${{ inputs.backend_image }}
          FRONTEND_IMAGE: ${{ inputs.frontend_image }}
        run: |
          set -euo pipefail
          kubectl apply -f k8s/backend/service.yaml
          kubectl apply -f k8s/frontend/service.yaml
          # The Deployment manifests carry image: "PLACEHOLDER" (images are built
          # and pushed manually — see docs/16-deployment.md). Substitute the URIs
          # supplied as workflow inputs. '#' is the sed delimiter since image URIs
          # contain '/' and ':'. Fail fast if a placeholder line drifted — otherwise
          # sed exits 0 without substituting and the manifest ships image: "PLACEHOLDER".
          for f in k8s/backend/deployment.yaml k8s/frontend/deployment.yaml; do
            grep -q 'image: "PLACEHOLDER"' "$f" || {
              echo "::error::image placeholder not found in $f — cannot inject the image."; exit 1; }
          done
          sed "s#image: \"PLACEHOLDER\".*#image: \"${BACKEND_IMAGE}\"#" k8s/backend/deployment.yaml | kubectl apply -f -
          sed "s#image: \"PLACEHOLDER\".*#image: \"${FRONTEND_IMAGE}\"#" k8s/frontend/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/hpa/frontend-hpa.yaml

      - name: Wait for rollout
        run: |
          set -euo pipefail
          kubectl -n "$NAMESPACE" rollout status deployment/backend  --timeout=180s
          kubectl -n "$NAMESPACE" rollout status deployment/frontend --timeout=180s

      - name: Apply ingress
        run: |
          set -euo pipefail
          # Applied after a healthy rollout so the ALB registers healthy targets.
          # HTTP-only listener: TLS terminates at the platform CloudFront
          # distribution that fronts this ALB (see docs/16-deployment.md "HTTPS
          # via the CloudFront default domain"), so no certificate is injected.
          kubectl apply -f k8s/ingress/alb-ingress.yaml

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## Deployment summary"
            echo "- Environment: \`${{ inputs.environment }}\`"
            echo "- Cluster: \`$CLUSTER_NAME\`"
            echo "- Backend image: \`${{ inputs.backend_image }}\`"
            echo "- Frontend image: \`${{ inputs.frontend_image }}\`"
            echo ""
            echo '```'
            kubectl -n "$NAMESPACE" get deploy,svc,ingress 2>/dev/null || echo "(cluster state unavailable)"
            echo '```'
            alb="$(kubectl -n "$NAMESPACE" get ingress hosting-platform -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
            if [ -n "$alb" ]; then
              echo "- ALB hostname (CloudFront origin, HTTP only — not the public URL): \`$alb\`"
              echo "- Platform URL: \`https://\$(terraform output -raw platform_cloudfront_domain_name)\` — on the FIRST deploy, set \`alb_dns_name = \"$alb\"\` in terraform.tfvars and re-apply to create the platform CloudFront distribution (docs/16-deployment.md)."
            else
              echo "- ALB hostname: still provisioning — check \`kubectl -n $NAMESPACE get ingress\` shortly."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
