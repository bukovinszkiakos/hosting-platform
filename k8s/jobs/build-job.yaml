# Reference template only. The backend (BuildJobSpecFactory + KubernetesJobService)
# creates Job objects programmatically via the Kubernetes API; this file documents
# the equivalent spec and the documented build workflow
# (docs/10-deployment-workflow.md Steps 5-11). Keep it in sync with
# backend/.../Services/BuildJobSpecFactory.cs and BuildJobEnvironment.cs.
apiVersion: batch/v1
kind: Job
metadata:
  name: build-job # BuildJobSpecFactory sets the real name: build-<deployment-id>
  namespace: hosting-platform
  labels:
    app: hosting-platform-build
    deployment-id: "" # BuildJobSpecFactory sets the deployment id
spec:
  backoffLimit: 0 # single attempt; a failed build becomes a Failed deployment (no retry)
  ttlSecondsAfterFinished: 3600 # auto-remove finished Jobs after 1 hour
  activeDeadlineSeconds: 600 # Kubernetes terminates the build after 10 min so it cannot publish after the deployment is marked Failed
  template:
    metadata:
      labels:
        app: hosting-platform-build
        deployment-id: "" # BuildJobSpecFactory sets the deployment id
    spec:
      restartPolicy: Never
      # Bound to the Backend Service IAM role via EKS Pod Identity, granting the
      # S3 + CloudFront access the build script needs (see k8s/base/serviceaccount.yaml).
      serviceAccountName: hosting-platform
      # The build container never calls the Kubernetes API, so the default API token
      # is not mounted (attack surface for untrusted repo code). Pod Identity injects
      # its own token separately, so AWS access is unaffected.
      automountServiceAccountToken: false
      containers:
        - name: build
          image: node:20-slim # git + AWS CLI v2 are installed at runtime below (docs/12 Build Environment)
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              apt-get update
              apt-get install -y --no-install-recommends git curl unzip ca-certificates
              curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-$(uname -m).zip" -o /tmp/awscliv2.zip
              unzip -q /tmp/awscliv2.zip -d /tmp
              /tmp/aws/install
              git clone --depth 1 "$REPOSITORY_URL" /workspace
              cd /workspace
              if [ -f package.json ]; then
                npm install
                npm run build
              fi
              OUTPUT=.
              for dir in dist build out; do
                if [ -d "$dir" ]; then OUTPUT="$dir"; break; fi
              done
              aws s3 sync "$OUTPUT" "s3://$S3_BUCKET/$USER_ID/$PROJECT_ID/" --delete --exclude ".git/*"
              aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/$USER_ID/$PROJECT_ID/*"
          env:
            # Set dynamically by BuildJobSpecFactory, per deployment
            - name: DEPLOYMENT_ID
              value: ""
            - name: PROJECT_ID
              value: ""
            - name: USER_ID
              value: ""
            - name: REPOSITORY_URL
              value: ""
            # Injected by BuildJobSpecFactory from the backend AwsSettings configuration
            - name: S3_BUCKET
              value: ""
            - name: AWS_REGION
              value: ""
            - name: CLOUDFRONT_DISTRIBUTION_ID
              value: ""
          resources:
            requests:
              cpu: 1000m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
