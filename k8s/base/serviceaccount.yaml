# Platform service account used by the backend Deployment and the per-deployment
# build Jobs. It is bound to the Backend Service IAM role through an EKS Pod
# Identity association (terraform/modules/iam), which grants the S3 + CloudFront
# permissions the build pods need to upload sites and invalidate the cache.
#
# No annotation is required: Pod Identity resolves credentials through the
# association, not through an IRSA role-arn annotation.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hosting-platform
  namespace: hosting-platform
