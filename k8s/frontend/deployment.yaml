apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: hosting-platform
  labels:
    app: frontend
spec:
  # No spec.replicas: the frontend HPA (k8s/hpa/frontend-hpa.yaml) owns the
  # replica count (1-3). Declaring replicas here would reset the count to 1 on
  # every `kubectl apply` and momentarily undo the HPA's scaling.
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: "PLACEHOLDER" # TODO: set ECR image URI
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: frontend-config
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
