# Example Secret for the backend Deployment.
#
# Recommended: run scripts/deployment/bootstrap-config.sh, which builds the
# connection string from the Terraform outputs + the DB_PASSWORD env var and
# applies the Secret without ever writing it to disk. This file is the
# reference/fallback template — copy to a real manifest, fill in the value, and
# apply (or `kubectl create secret generic ...`). Do NOT commit real secret values
# (see .gitignore and docs/16-deployment.md "Configuration and secrets bootstrap").
#
# The database connection string points at the RDS instance provisioned by
# Terraform (see docs/05-aws-architecture.md and docs/07-kubernetes.md "Secrets").
# Nested keys use the ASP.NET Core "__" convention
# (ConnectionStrings__DefaultConnection binds to ConnectionStrings:DefaultConnection).
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: hosting-platform
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Host=REPLACE_RDS_ENDPOINT;Port=5432;Database=hostingplatform;Username=REPLACE_USER;Password=REPLACE_PASSWORD"
