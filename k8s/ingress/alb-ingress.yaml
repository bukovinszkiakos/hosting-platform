apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hosting-platform
  namespace: hosting-platform
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # HTTP-only listener: TLS terminates at the platform CloudFront distribution
    # (default *.cloudfront.net certificate), which fronts this ALB as its origin
    # — ACM cannot issue certificates for *.elb.amazonaws.com, so the ALB itself
    # has no HTTPS listener. Browsers must reach the platform through CloudFront:
    # the backend issues Secure session cookies in Production, which browsers
    # drop over plain HTTP, so login does not work against the raw ALB hostname.
    # See docs/16-deployment.md "HTTPS via the CloudFront default domain".
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
