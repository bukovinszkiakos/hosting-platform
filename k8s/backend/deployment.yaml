apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hosting-platform
  labels:
    app: backend
spec:
  # Single replica for the MVP: the deployment queue is in-memory and per-pod and
  # ASP.NET Data Protection keys are ephemeral, so multiple replicas would lose
  # queued deployments and fail to share auth cookies. There is intentionally no
  # backend HPA (see docs/07-kubernetes.md "Horizontal Pod Autoscaler").
  replicas: 1
  # Recreate, not RollingUpdate: the default rolling update briefly runs TWO
  # backend pods (maxSurge 1), violating the single-replica invariant above —
  # the new pod's startup recovery would mark deployments Failed while the old
  # pod is still driving them, and the pods cannot share auth cookies. The cost
  # is a few seconds of API downtime per deploy, which the MVP accepts.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Bound to the Backend Service IAM role via EKS Pod Identity (see
      # k8s/base/serviceaccount.yaml and terraform/modules/iam).
      serviceAccountName: hosting-platform
      containers:
        - name: backend
          image: "PLACEHOLDER" # TODO: set ECR image URI
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
